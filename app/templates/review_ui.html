<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Review Disagreements</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0f172a; color: #e2e8f0; min-height: 100vh; padding: 1.5rem;
  }
  h1 { font-size: 1.3rem; color: #94a3b8; font-weight: 400; margin-bottom: 1rem; }
  .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
  .stats { display: flex; gap: 1.5rem; font-size: 0.85rem; }
  .stats span { padding: 4px 10px; border-radius: 6px; }
  .s-agreed { background: #166534; color: #4ade80; }
  .s-disagreed { background: #7f1d1d; color: #f87171; }
  .s-reviewed { background: #713f12; color: #fbbf24; }
  .card { background: #1e293b; border-radius: 12px; padding: 1.5rem; border: 1px solid #334155; margin-bottom: 1rem; }
  .serial { font-size: 0.8rem; color: #64748b; margin-bottom: 0.25rem; }
  .doc-title { font-size: 1.1rem; font-weight: 600; color: #f8fafc; margin-bottom: 0.75rem; }
  .abstract { font-size: 0.9rem; color: #cbd5e1; line-height: 1.6; max-height: 200px; overflow-y: auto; margin-bottom: 1rem; padding: 0.75rem; background: #0f172a; border-radius: 8px; }
  .models { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
  .model-card { padding: 1rem; border-radius: 8px; }
  .model-gpt { background: #1a2332; border: 1px solid #1d4ed8; }
  .model-claude { background: #1a2332; border: 1px solid #9333ea; }
  .model-label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.5rem; font-weight: 600; }
  .model-gpt .model-label { color: #60a5fa; }
  .model-claude .model-label { color: #c084fc; }
  .code-row { display: flex; gap: 0.5rem; margin-bottom: 0.25rem; font-size: 0.85rem; }
  .code-label { color: #64748b; width: 70px; }
  .code-val { color: #f8fafc; font-weight: 600; }
  .code-desc { color: #94a3b8; font-size: 0.8rem; }
  .reasoning { font-size: 0.8rem; color: #94a3b8; margin-top: 0.5rem; font-style: italic; }
  .decision { margin-top: 1rem; }
  .decision h3 { font-size: 0.9rem; color: #94a3b8; margin-bottom: 0.75rem; }
  .btn-row { display: flex; gap: 0.75rem; flex-wrap: wrap; margin-bottom: 1rem; }
  .btn { padding: 8px 16px; border-radius: 8px; border: 1px solid #334155; background: #1e293b; color: #e2e8f0; cursor: pointer; font-size: 0.85rem; transition: all 0.15s; }
  .btn:hover { background: #334155; }
  .btn-gpt { border-color: #1d4ed8; }
  .btn-gpt:hover, .btn-gpt.active { background: #1d4ed8; color: white; }
  .btn-claude { border-color: #9333ea; }
  .btn-claude:hover, .btn-claude.active { background: #9333ea; color: white; }
  .btn-submit { background: #16a34a; border-color: #16a34a; color: white; padding: 10px 24px; font-weight: 600; }
  .btn-submit:hover { background: #15803d; }
  .btn-submit:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-skip { background: transparent; border-color: #475569; color: #94a3b8; }
  .btn-skip:hover { background: #1e293b; }
  .custom-codes { display: none; gap: 0.75rem; margin-bottom: 1rem; align-items: end; }
  .custom-codes.show { display: flex; flex-wrap: wrap; }
  .field { display: flex; flex-direction: column; gap: 4px; }
  .field label { font-size: 0.75rem; color: #64748b; }
  .field select, .field input { background: #0f172a; border: 1px solid #334155; border-radius: 6px; color: #e2e8f0; padding: 6px 10px; font-size: 0.85rem; }
  .done-msg { text-align: center; padding: 3rem; font-size: 1.2rem; color: #4ade80; }
  .progress-bar-bg { background: #334155; border-radius: 6px; height: 6px; margin-bottom: 1rem; }
  .progress-bar-fill { background: linear-gradient(90deg, #3b82f6, #8b5cf6); height: 100%; border-radius: 6px; transition: width 0.5s; }
  .note-field { width: 100%; background: #0f172a; border: 1px solid #334155; border-radius: 6px; color: #e2e8f0; padding: 8px; font-size: 0.85rem; margin-bottom: 0.75rem; }
  .highlight { background: #fbbf2433; padding: 0 2px; border-radius: 2px; }
  .counter { color: #64748b; font-size: 0.85rem; }
</style>
</head>
<body>

<div class="top-bar">
  <h1>Review Disagreements</h1>
  <div class="stats">
    <span class="s-agreed" id="st-agreed">Agreed: —</span>
    <span class="s-reviewed" id="st-reviewed">Reviewed: —</span>
    <span class="s-disagreed" id="st-disagreed">Remaining: —</span>
  </div>
</div>

<div class="progress-bar-bg"><div class="progress-bar-fill" id="pbar" style="width:0%"></div></div>

<div id="content"><div class="card"><p style="color:#94a3b8">Loading...</p></div></div>

<script>
let taxonomy = {};
let current = null;
let skipOffset = 0;

async function init() {
  const r = await fetch('/review/ui/taxonomy');
  taxonomy = await r.json();
  await loadNext();
}

function desc(code) {
  const t = taxonomy[String(code)];
  return t ? t.category + ' > ' + t.description : 'Unknown';
}

async function updateStats() {
  const r = await fetch('/review/ui/stats');
  const d = await r.json();
  document.getElementById('st-agreed').textContent = 'Agreed: ' + d.agreed;
  document.getElementById('st-reviewed').textContent = 'Reviewed: ' + d.human_reviewed;
  document.getElementById('st-disagreed').textContent = 'Remaining: ' + d.disagreed;
  const total = d.agreed + d.disagreed + d.human_reviewed;
  const done = d.agreed + d.human_reviewed;
  document.getElementById('pbar').style.width = (100 * done / total) + '%';
}

async function loadNext() {
  await updateStats();
  const r = await fetch('/review/ui/next?offset=' + skipOffset);
  const d = await r.json();
  if (d.done) {
    document.getElementById('content').innerHTML = '<div class="done-msg">All disagreements reviewed!</div>';
    return;
  }
  current = d;
  renderDoc(d);
}

function renderDoc(d) {
  const doc = d.document;
  const c = d.classification;
  const gp = c.gpt_primary, gs = c.gpt_secondary || '—', gt = c.gpt_tertiary || '—';
  const cp = c.claude_primary, cs = c.claude_secondary || '—', ct = c.claude_tertiary || '—';
  const diff = gp !== cp;

  let html = '<div class="card">';
  html += '<div class="serial">' + doc.serial_number + ' &middot; ' + (doc.doc_type || '') + ' &middot; ' + (doc.year || '—') + ' <span class="counter">(' + d.remaining + ' remaining)</span></div>';
  html += '<div class="doc-title">' + esc(doc.title) + '</div>';
  html += '<div class="abstract">' + esc(doc.abstract) + '</div>';

  html += '<div class="models">';
  html += '<div class="model-card model-gpt"><div class="model-label">GPT-4o</div>';
  html += codeRow('Primary', gp) + codeRow('Secondary', gs) + codeRow('Tertiary', gt);
  html += '</div>';
  html += '<div class="model-card model-claude"><div class="model-label">Claude Sonnet</div>';
  html += codeRow('Primary', cp) + codeRow('Secondary', cs) + codeRow('Tertiary', ct);
  html += '</div>';
  html += '</div>';

  html += '<div class="decision"><h3>Your Decision</h3>';
  html += '<div class="btn-row">';
  html += '<button class="btn btn-gpt" onclick="pickGPT()">Use GPT (' + gp + ': ' + desc(gp).split(">")[1] + ')</button>';
  html += '<button class="btn btn-claude" onclick="pickClaude()">Use Claude (' + cp + ': ' + desc(cp).split(">")[1] + ')</button>';
  html += '<button class="btn" onclick="toggleCustom()">Custom codes</button>';
  html += '</div>';

  html += '<div class="custom-codes" id="custom">';
  html += selectField('cust-primary', 'Primary');
  html += selectField('cust-secondary', 'Secondary');
  html += selectField('cust-tertiary', 'Tertiary');
  html += '</div>';

  html += '<input class="note-field" id="note" placeholder="Optional note (e.g. why you chose this)">';

  html += '<div class="btn-row">';
  html += '<button class="btn btn-submit" id="submitBtn" onclick="submit()" disabled>Submit Decision</button>';
  html += '<button class="btn btn-skip" onclick="skip()">Skip for now</button>';
  html += '</div>';

  html += '</div></div>';
  document.getElementById('content').innerHTML = html;
}

function codeRow(label, code) {
  return '<div class="code-row"><span class="code-label">' + label + ':</span><span class="code-val">' + code + '</span><span class="code-desc">' + desc(code) + '</span></div>';
}

function selectField(id, label) {
  let opts = '';
  for (const [k, v] of Object.entries(taxonomy).sort((a,b) => +a[0] - +b[0])) {
    opts += '<option value="' + v.code + '">' + v.code + ': ' + v.description + '</option>';
  }
  return '<div class="field"><label>' + label + '</label><select id="' + id + '">' + opts + '</select></div>';
}

let chosen = null;

function pickGPT() {
  const c = current.classification;
  chosen = { primary: c.gpt_primary, secondary: c.gpt_secondary, tertiary: c.gpt_tertiary };
  document.getElementById('submitBtn').disabled = false;
  document.querySelectorAll('.btn-gpt').forEach(b => b.classList.add('active'));
  document.querySelectorAll('.btn-claude').forEach(b => b.classList.remove('active'));
}

function pickClaude() {
  const c = current.classification;
  chosen = { primary: c.claude_primary, secondary: c.claude_secondary, tertiary: c.claude_tertiary };
  document.getElementById('submitBtn').disabled = false;
  document.querySelectorAll('.btn-claude').forEach(b => b.classList.add('active'));
  document.querySelectorAll('.btn-gpt').forEach(b => b.classList.remove('active'));
}

function toggleCustom() {
  const el = document.getElementById('custom');
  el.classList.toggle('show');
  if (el.classList.contains('show')) {
    chosen = null;
    document.getElementById('submitBtn').disabled = false;
  }
}

function skip() { skipOffset++; loadNext(); }

async function submit() {
  if (!chosen) {
    chosen = {
      primary: +document.getElementById('cust-primary').value,
      secondary: +document.getElementById('cust-secondary').value,
      tertiary: +document.getElementById('cust-tertiary').value,
    };
  }
  const note = document.getElementById('note').value || undefined;
  const body = { serial_number: current.document.serial_number, ...chosen, note };

  const r = await fetch('/review/resolve', {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(body),
  });
  if (r.ok) { skipOffset = 0; await loadNext(); }
  else { const e = await r.json(); alert('Error: ' + e.detail); }
}

function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

init();
</script>
</body>
</html>
